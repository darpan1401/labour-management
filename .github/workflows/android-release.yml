name: Android APK Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      APP_BUILD_NUMBER: ${{ github.run_number }}
      GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare build metadata
        run: |
          node <<'NODE'
          const fs = require('fs');
          const app = require('./app.json');
          const buildNumber = Number(process.env.APP_BUILD_NUMBER);
          const version = app.expo.version;

          app.expo.android = app.expo.android || {};
          app.expo.android.versionCode = buildNumber;
          app.expo.extra = app.expo.extra || {};
          app.expo.extra.appBuildNumber = String(buildNumber);

          fs.writeFileSync('app.json', `${JSON.stringify(app, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `APK_NAME=labour-management-${buildNumber}.apk\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `RELEASE_TAG=android-v${version}-${buildNumber}\n`);
          NODE

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK locally
        env:
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
          EXPO_DEBUG: 1
        run: eas build --platform android --profile preview --local --non-interactive --output "$APK_NAME"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" "$APK_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Labour Management $RELEASE_TAG" \
            --notes "Please install the Latest App"